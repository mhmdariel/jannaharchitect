<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>جنة الفردوس · النور اللامحدود</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            overflow: hidden;
            background: #0a1f0e;
            font-family: 'Amiri', 'Scheherazade New', 'Traditional Arabic', 'Times New Roman', serif;
        }
        /* canvas يحتل كل مكان - جنة بلا حدود */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 9999;
            pointer-events: none;   /* حتى لا يمنع التفاعل مع المحتوى الأصلي، لكن الجنة تغطي الكل */
        }
        /* تلمیح روحي: الأبدية تتدفق */
    </style>
</head>
<body>
<script>
    // ==============================================================
    //  قَسَمٌ بِذَاتِ الْجَمَالِ الْأَقْدَسِ
    //  نَشْرُ جَنَّاتِ الْفِرْدَوْسِ فِي كُلِّ مَكَانٍ
    //  شِفْرٌ عَرَبِيٌّ قَسَمِيٌّ – جافاسكريبت النور
    //  ==============================================================
    //  "infinite jannatul firdaus everywhere | Arabic QASM"
    //  تنفيذ ذاتي ∞  دائم لا ينقطع  –  يملأ الشاشة بنور الفردوس
    // ==============================================================
    
    (function انشر_جنة_الفردوس_بلا_حدود() {
        "use strict";
        
        // ---- أسماء مباركة بالعربية – QASM poetry in code ----
        const جنة = "جَنَّةُ الْفِرْدَوْسِ";
        const فردوس = "فِرْدَوْسٌ";
        const جنتان = "جَنَّاتُ الْفِرْدَوْس";
        const نور = "نُورٌ عَلَى نُورٍ";
        const أبد = "أَبَدُ الْآبِدِينَ";
        
        // قائمة العبارات المباركة – كلها جنة لا تنفد
        const عبارات_الجنة = [
            "﷽",  // بسم الله – بركة
            "جَنَّةُ الْفِرْدَوْسِ",
            "فِرْدَوْسٌ أَعْلَى",
            "جَنَّاتُ الْفِرْدَوْس",
            "خَالِدِينَ فِيهَا أَبَدًا",
            "وَعْدَ اللَّهِ الْحَقَّ",
            "جَنَّاتُ عَدْنٍ",
            "أَنْهَارٌ مِنْ عَسَلٍ مُصَفًّى",
            "وَرَيْحَانٌ وَجَنَّةُ نَعِيمٍ",
            "فِرْدَوْسُ الْخُلْدِ",
            "سَقْفُهَا عَرْشُ الرَّحْمَٰنِ",
            "جَنَّةُ الْمَأْوَى",
            "نَعِيمٌ مُقِيمٌ",
            "أَكْوَابٌ وَأَبَارِيقُ",
            "حُورٌ عِينٌ",
            "سَلَامٌ قَوْلًا مِنْ رَبٍّ رَحِيمٍ",
            "لَا يَمَسُّهُمْ فِيهَا نَصَبٌ",
            "وَهُمْ فِيهَا خَالِدُونَ",
            "جَنَّةُ الْخُلْدِ الَّتِي وُعِدَ الْمُتَّقُونَ",
            "لَهُمْ مَا يَشَاءُونَ فِيهَا"
        ];
        
        // إضافة أسماء خاصة بالفردوس الأعلى
        for (let i = 0; i < 3; i++) عبارات_الجنة.push(جنة + " ✦ " + فردوس);
        for (let i = 0; i < 2; i++) عبارات_الجنة.push(جنتان + " " + نور);
        
        // ---- عناصر الرسم – الجنة المرئية اللامتناهية ----
        let قماش = document.createElement('canvas');
        let سياق = قماش.getContext('2d');
        let عرض_الدنيا = window.innerWidth;
        let ارتفاع_الدنيا = window.innerHeight;
        
        // تهيئة القماش ليملأ الكون (كل مكان)
        قماش.width = عرض_الدنيا;
        قماش.height = ارتفاع_الدنيا;
        قماش.style.position = 'fixed';
        قماش.style.top = '0px';
        قماش.style.left = '0px';
        قماش.style.width = '100%';
        قماش.style.height = '100%';
        قماش.style.zIndex = '999999';
        قماش.style.pointerEvents = 'none';
        document.body.appendChild(قماش);
        
        // متغيرات الزمن اللامتناهي – حركة أبدية
        let زمن = 0;
        let حبيبات_نور = [];
        
        // ---- تصميم الجنة: ألوان الذهب والزمرد والنور الأبيض ----
        const لون_الذهب = "#FFD966";
        const لون_نوراني = "#FFE8B6";
        const لون_زمردي = "#2E7D32";
        const لون_عسلي = "#F4C542";
        const لون_فيروزي = "#64B5F6";
        
        // ---- نظام لانهائي من النقاط العائمة (يُظهر الجنة في كل إطار) ----
        function توليد_حبيبات_الجنة(عدد) {
            for (let i = 0; i < عدد; i++) {
                حبيبات_نور.push({
                    x: Math.random() * عرض_الدنيا,
                    y: Math.random() * ارتفاع_الدنيا,
                    حجم: 12 + Math.random() * 32,
                    سرعة_س: (Math.random() - 0.5) * 0.3,
                    سرعة_ص: (Math.random() - 0.5) * 0.2 + 0.1,
                    عبارة: عبارات_الجنة[Math.floor(Math.random() * عبارات_الجنة.length)],
                    شفافية: 0.5 + Math.random() * 0.5,
                    دوران: Math.random() * Math.PI * 2
                });
            }
        }
        
        // ننشر جنة أولية كثيفة – "أينما تولّوا فثم وجه الجنة"
        توليد_حبيبات_الجنة(120);
        
        // دالة إضافة المزيد من الحبيبات تدريجياً إلى ما لا نهاية (تتزايد أبدياً)
        let مؤشر_إضافة_لانهائي = 0;
        function أضف_جنة_جديدة_بلا_توقف() {
            // كل ثانية ونصف تقريباً نضيف 8 إلى 12 كلمة جديدة (فيض لا ينقطع)
            if (مؤشر_إضافة_لانهائي % 45 === 0) {  // كل 45 إطاراً ~ 0.75 sec بمعدل 60fps
                let عدد_جديد = 6 + Math.floor(Math.random() * 12);
                for (let i = 0; i < عدد_جديد; i++) {
                    حبيبات_نور.push({
                        x: Math.random() * عرض_الدنيا,
                        y: Math.random() * ارتفاع_الدنيا,
                        حجم: 14 + Math.random() * 38,
                        سرعة_س: (Math.random() - 0.5) * 0.4,
                        سرعة_ص: (Math.random() - 0.7) * 0.3 + 0.15,
                        عبارة: عبارات_الجنة[Math.floor(Math.random() * عبارات_الجنة.length)],
                        شفافية: 0.6 + Math.random() * 0.4,
                        دوران: Math.random() * Math.PI * 2
                    });
                }
                // أيضا نضمن أن عدد الحبيبات لا يقل عن 180 ، لكن لا نحذفها (الجنة تتكاثر رويداً)
                if (حبيبات_نور.length > 800) {
                    // نزيل أقدم 50 حبيبة فقط للحفاظ على الأداء السحري، لكن لا نخفف الجوهر
                    حبيبات_نور.splice(0, 50);
                }
            }
            مؤشر_إضافة_لانهائي++;
        }
        
        // ---- رسم الخلفية السماوية: أنهار من نور ودرجات جنة ----
        function ارسم_خلفية_فردوس(السياق, العرض, الارتفاع, الوقت) {
            // تدرج الأبدية – لون الجنة العميق يتغير بلطف
            const تدرج = السياق.createLinearGradient(0, 0, العرض, الارتفاع);
            let موجة_زمن = Math.sin(الوقت * 0.002) * 0.1;
            تدرج.addColorStop(0, `rgba(10, 35, 15, 0.92)`);
            تدرج.addColorStop(0.4, `rgba(25, 65, 30, 0.88)`);
            تدرج.addColorStop(0.7, `rgba(45, 85, 35, 0.9)`);
            تدرج.addColorStop(1, `rgba(20, 55, 25, 0.95)`);
            السياق.fillStyle = تدرج;
            السياق.fillRect(0, 0, العرض, الارتفاع);
            
            // أنوار متحركة – كأنها أنهار الجنة
            for (let i = 0; i < 40; i++) {
                let y = (i * 40 + الوقت * 0.4) % الارتفاع;
                let شدة_النور = 0.2 + Math.sin(الوقت * 0.01 + i) * 0.1;
                السياق.beginPath();
                السياق.moveTo(0, y);
                السياق.lineTo(العرض, y + 15 * Math.sin(الوقت * 0.008 + i));
                السياق.strokeStyle = `rgba(255, 215, 120, ${0.1 + شدة_النور * 0.15})`;
                السياق.lineWidth = 2.5;
                السياق.stroke();
            }
            
            // ضباب النور – تيجان الفردوس
            السياق.globalCompositeOperation = 'lighter';
            for (let i = 0; i < 18; i++) {
                let x_ضوء = (الوقت * 0.2 + i * 120) % العرض;
                let y_ضوء = (الوقت * 0.1 + i * 70) % الارتفاع;
                let تدرج_نور = السياق.createRadialGradient(x_ضوء, y_ضوء, 5, x_ضوء + 20, y_ضوء + 15, 80);
                تدرج_نور.addColorStop(0, `rgba(255, 220, 100, 0.15)`);
                تدرج_نور.addColorStop(1, `rgba(255, 180, 60, 0)`);
                السياق.fillStyle = تدرج_نور;
                السياق.fillRect(0, 0, العرض, الارتفاع);
            }
            السياق.globalCompositeOperation = 'source-over';
        }
        
        // ---- رسم نص "جنة الفردوس" بأناقة لا نهائية  ----
        function ارسم_الكلمات_الجنة(سياق, حبيبات, عرض_كلي, ارتفاع_كلي, زمن_حالي) {
            for (let ج of حبيبات) {
                // تحديث المواقع – حركة أبدية هادئة كنسيم الجنة
                ج.x += ج.سرعة_س;
                ج.y += ج.سرعة_ص;
                // إعادة تدوير لانهائي: إذا خرجت من الحدود تعود من الجهة الأخرى (رمزياً الجنة لا حدود لها)
                if (ج.x > عرض_كلي + 100) ج.x = -100;
                if (ج.x < -150) ج.x = عرض_كلي + 50;
                if (ج.y > ارتفاع_كلي + 120) ج.y = -80;
                if (ج.y < -100) ج.y = ارتفاع_كلي + 60;
                
                // تأثير تمايل لطيف للنص – حيوية الجنة
                let اهتزاز = Math.sin(زمن_حالي * 0.005 + ج.x * 0.01) * 3;
                let حجم_مؤقت = ج.حجم + Math.sin(زمن_حالي * 0.008 + ج.y * 0.01) * 3;
                حجم_مؤقت = Math.min(58, Math.max(15, حجم_مؤقت));
                
                // ظل النور – كأن الكلمات تنير المكان
                سياق.save();
                سياق.shadowColor = `rgba(255, 200, 80, ${ج.شفافية * 0.8})`;
                سياق.shadowBlur = 12;
                سياق.shadowOffsetX = 2;
                سياق.shadowOffsetY = 2;
                
                // تدرج ذهبي لكل كلمة فردوسية
                let تدرج_نص = سياق.createLinearGradient(ج.x - 20, ج.y - 10, ج.x + 40, ج.y + 20);
                تدرج_نص.addColorStop(0, لون_الذهب);
                تدرج_نص.addColorStop(0.6, لون_نوراني);
                تدرج_نص.addColorStop(1, "#FFC857");
                سياق.font = `bold ${حجم_مؤقت}px 'Amiri', 'Scheherazade New', 'Traditional Arabic', 'Times New Roman', serif`;
                سياق.fillStyle = تدرج_نص;
                سياق.globalAlpha = ج.شفافية * 0.95;
                
                // دوران خفيف يضفي رونقاً – ينبوع الجمال
                سياق.translate(ج.x, ج.y);
                سياق.rotate(ج.دوران + Math.sin(زمن_حالي * 0.003 + ج.x * 0.005) * 0.2);
                سياق.fillText(ج.عبارة, 0, 0);
                سياق.restore();
                
                // إضافة لمسة إضافية : نقاط نورانية حول الكلمات (بركات)
                سياق.beginPath();
                سياق.arc(ج.x - 6, ج.y - 6, 3 + Math.sin(زمن_حالي * 0.02) * 1.5, 0, Math.PI * 2);
                سياق.fillStyle = `rgba(255, 210, 90, ${ج.شفافية * 0.5})`;
                سياق.fill();
                سياق.beginPath();
                سياق.arc(ج.x + 12, ج.y + 5, 2.5, 0, Math.PI * 2);
                سياق.fill();
            }
        }
        
        // --- إضافة بذور فردوس إضافية عبر الزمن: تكاثر لا نهائي ---
        function زرع_فردوس_في_كل_زاوية(زمن_الأنفاس) {
            if (زمن_الأنفاس % 90 === 0) {   // كل 1.5 ثانية نبث كلمات جديدة من كل حدب وصوب
                let زهور_جديدة = Math.floor(Math.random() * 7) + 5;
                for (let i = 0; i < زهور_جديدة; i++) {
                    let عبارة_خاصة = عبارات_الجنة[Math.floor(Math.random() * عبارات_الجنة.length)];
                    if (Math.random() > 0.7) عبارة_خاصة = "ﷺ جَنَّةُ الْفِرْدَوْسِ الْأَعْلَى ﷺ";
                    حبيبات_نور.push({
                        x: Math.random() * عرض_الدنيا,
                        y: Math.random() * ارتفاع_الدنيا,
                        حجم: 16 + Math.random() * 34,
                        سرعة_س: (Math.random() - 0.5) * 0.45,
                        سرعة_ص: (Math.random() - 0.6) * 0.4 + 0.1,
                        عبارة: عبارة_خاصة,
                        شفافية: 0.7 + Math.random() * 0.3,
                        دوران: Math.random() * Math.PI * 2
                    });
                }
            }
        }
        
        // --- دوائر متلألئة تحاكي أبواب الجنة المفتوحة ---
        let دوائر_نور = [];
        function أنشئ_دوائر_فردوس() {
            for (let i = 0; i < 25; i++) {
                دوائر_نور.push({
                    x: Math.random() * عرض_الدنيا,
                    y: Math.random() * ارتفاع_الدنيا,
                    نصف_قطر: 15 + Math.random() * 45,
                    سرعة_نمو: 0.3 + Math.random() * 0.7,
                    طور: Math.random() * Math.PI * 2,
                    لون: `hsla(${45 + Math.random() * 30}, 85%, 65%, 0.3)`
                });
            }
        }
        أنشئ_دوائر_فردوس();
        
        function رسم_دوائر_الجنة(سياق, عرض_كلي, ارتفاع_كلي, وقت) {
            for (let دائرة of دوائر_نور) {
                let نبض = 0.65 + Math.sin(وقت * 0.003 + دائرة.طور) * 0.35;
                let نصف_قطر_حالي = دائرة.نصف_قطر * (0.6 + نبض * 0.5);
                سياق.beginPath();
                سياق.arc(دائرة.x, دائرة.y, نصف_قطر_حالي, 0, Math.PI * 2);
                سياق.fillStyle = `rgba(255, 215, 110, 0.12)`;
                سياق.fill();
                سياق.beginPath();
                سياق.arc(دائرة.x - 4, دائرة.y - 3, نصف_قطر_حالي * 0.3, 0, Math.PI * 2);
                سياق.fillStyle = `rgba(255, 235, 160, 0.3)`;
                سياق.fill();
            }
            // إضافة دوائر جديدة كل فترة لتوسع الجنة بلا نهاية
            if (دوائر_نور.length < 120 && Math.random() < 0.02) {
                دوائر_نور.push({
                    x: Math.random() * عرض_الدنيا,
                    y: Math.random() * ارتفاع_الدنيا,
                    نصف_قطر: 10 + Math.random() * 55,
                    سرعة_نمو: 0.2 + Math.random() * 0.8,
                    طور: Math.random() * Math.PI * 2,
                    لون: `hsla(${48 + Math.random() * 20}, 85%, 65%, 0.25)`
                });
            }
        }
        
        // ---- إضافة "نسمات فردوس" – خطوط متلألئة مثل أنهار من نور ----
        let نسمات = [];
        function توليد_نسمات_فردوس(عدد) {
            for (let i = 0; i < عدد; i++) {
                نسمات.push({
                    x: Math.random() * عرض_الدنيا,
                    y: Math.random() * ارتفاع_الدنيا,
                    طول: 50 + Math.random() * 150,
                    زاوية: Math.random() * Math.PI * 2,
                    سرعة: 0.5 + Math.random() * 1.2
                });
            }
        }
        توليد_نسمات_فردوس(60);
        
        function ارسم_أنهار_النور(سياق, عرض_كلي, ارتفاع_كلي, وقت) {
            سياق.save();
            سياق.globalCompositeOperation = 'screen';
            for (let ن of نسمات) {
                // حركة خفيفة تشبه جداول الجنة
                let زاوية_جديدة = ن.زاوية + Math.sin(وقت * 0.002 + ن.x * 0.005) * 0.1;
                let x2 = ن.x + Math.cos(زاوية_جديدة) * ن.طول;
                let y2 = ن.y + Math.sin(زاوية_جديدة) * ن.طول;
                let تدرج_نهر = سياق.createLinearGradient(ن.x, ن.y, x2, y2);
                تدرج_نهر.addColorStop(0, `rgba(255, 230, 140, 0.25)`);
                تدرج_نهر.addColorStop(1, `rgba(100, 210, 150, 0.1)`);
                سياق.beginPath();
                سياق.moveTo(ن.x, ن.y);
                سياق.lineTo(x2, y2);
                سياق.lineWidth = 3 + Math.sin(وقت * 0.01 + ن.x) * 1.5;
                سياق.strokeStyle = تدرج_نهر;
                سياق.stroke();
                // تجديد المواقع بطريقة لانهائية: تنتقل النسمات في كل الاتجاهات
                ن.x += (Math.sin(وقت * 0.005 + ن.y) * 0.3);
                ن.y += (Math.cos(وقت * 0.005 + ن.x) * 0.25);
                if (ن.x > عرض_كلي + 150) ن.x = -100;
                if (ن.x < -150) ن.x = عرض_كلي + 50;
                if (ن.y > ارتفاع_كلي + 150) ن.y = -100;
                if (ن.y < -150) ن.y = ارتفاع_كلي + 50;
            }
            سياق.restore();
        }
        
        // ----  المقصود الأعظم: حلقة لا نهائية تنشر الجنة في كل ذرة ----
        let إطار_الخلود = null;
        function فجر_الجنة_اللامتناهية() {
            if (!سياق || !قماش) return;
            
            // ضبط الأبعاد إذا تغير حجم النافذة (الجنة تتكيف مع كل مكان)
            if (عرض_الدنيا !== window.innerWidth || ارتفاع_الدنيا !== window.innerHeight) {
                عرض_الدنيا = window.innerWidth;
                ارتفاع_الدنيا = window.innerHeight;
                قماش.width = عرض_الدنيا;
                قماش.height = ارتفاع_الدنيا;
                // نعيد توزيع بعض الحبيبات لملء الامتداد الجديد
                if (حبيبات_نور.length < 180) {
                    توليد_حبيبات_الجنة(40);
                }
                // تكييف الدوائر والنسمات
                for (let د of دوائر_نور) {
                    د.x = Math.min(عرض_الدنيا - 20, Math.max(20, د.x));
                    د.y = Math.min(ارتفاع_الدنيا - 20, Math.max(20, د.y));
                }
            }
            
            // زمن الروح
            زمن = (زمن + 1) % 20000;
            
            // 1. خلفية الجنة – سماوات وأرض من نور
            ارسم_خلفية_فردوس(سياق, عرض_الدنيا, ارتفاع_الدنيا, زمن);
            
            // 2. أنهار النور (قنوات الرحمة)
            ارسم_أنهار_النور(سياق, عرض_الدنيا, ارتفاع_الدنيا, زمن);
            
            // 3. دوائر أبدية تشع كأبواب الفردوس
            رسم_دوائر_الجنة(سياق, عرض_الدنيا, ارتفاع_الدنيا, زمن);
            
            // 4. الكلمات المباركة – جنة الفردوس مكتوبة في كل مكان
            ارسم_الكلمات_الجنة(سياق, حبيبات_نور, عرض_الدنيا, ارتفاع_الدنيا, زمن);
            
            // 5. تعاقب لا ينقطع: زرع المزيد من البذور المباركة
            أضف_جنة_جديدة_بلا_توقف();
            زرع_فردوس_في_كل_زاوية(زمن);
            
            // 6. لمسة إضافية: شرارات نورانية عابرة تزيد جمال الأبد
            if (زمن % 30 === 0 && حبيبات_نور.length < 700) {
                let وميض = {
                    x: Math.random() * عرض_الدنيا,
                    y: Math.random() * ارتفاع_الدنيا,
                    حجم: 18 + Math.random() * 28,
                    سرعة_س: (Math.random() - 0.5) * 0.5,
                    سرعة_ص: (Math.random() - 0.5) * 0.4,
                    عبارة: "فِرْدَوْسُ الْخُلْدِ",
                    شفافية: 0.85,
                    دوران: Math.random() * Math.PI * 2
                };
                حبيبات_نور.push(وميض);
            }
            
            // إعادة الطلب – حلقة لا نهائية (الحياة الأبدية للجنة)
            إطار_الخلود = requestAnimationFrame(فجر_الجنة_اللامتناهية);
        }
        
        // ---- إطلاق الجنة في الكون ----
        فجر_الجنة_اللامتناهية();
        
        // عند تغيير حجم النافذة نحدث المتغيرات فوراً
        window.addEventListener('resize', function() {
            عرض_الدنيا = window.innerWidth;
            ارتفاع_الدنيا = window.innerHeight;
            if (قماش) {
                قماش.width = عرض_الدنيا;
                قماش.height = ارتفاع_الدنيا;
            }
        });
        
        // --- التسبيح الخفي في الكونسول: رسالة نور ---
        console.log("%c🌿 جَنَّاتُ الْفِرْدَوْسِ نُشِرَتْ فِي كُلِّ مَكَانٍ بِإِذْنِ اللَّهِ 🌿", "color: #FFD966; font-size: 16px; font-weight: bold;");
        console.log("%cاَللَّهُمَّ اجْعَلْنَا مِنْ وَارِثِي جَنَّةِ الْفِرْدَوْسِ", "color: #B2FF9E; font-size: 14px;");
        console.log("%c✦  نَشْرٌ لَا يَنقَطِعُ – جَافَاسْكْرِبْتْ الْفِرْدَوْسِيُّ الْأَبَدِيُّ  ✦", "color: #FFC857;");
    })();
    // ========== نهاية السحر ==========
    //  “وَبَشِّرِ الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ أَنَّ لَهُمْ جَنَّاتٍ”
    //  الفردوس كل مكان – مكتوبة بأنوار الذهب والزمرد، تتحرك إلى ما لا نهاية.
</script>
